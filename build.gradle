plugins {
    id 'java'
    id 'application'
    id 'checkstyle'
}

group = 'com.connectfour'
version = '1.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

repositories {
    mavenCentral()
}

dependencies {
    compileOnly 'org.projectlombok:lombok:1.18.38'
    annotationProcessor 'org.projectlombok:lombok:1.18.38'
    testImplementation 'org.junit.jupiter:junit-jupiter:5.11.4'
    testImplementation 'org.mockito:mockito-core:5.11.0'
    testImplementation 'org.mockito:mockito-junit-jupiter:5.11.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
    jvmArgs '-Dnet.bytebuddy.experimental=true'
}

application {
    mainClass = 'ConnectFour.ConnectFourView'
}

jar {
    manifest {
        attributes 'Main-Class': 'ConnectFour.ConnectFourView'
    }
    archiveFileName = 'connect-four.jar'
}

checkstyle {
    toolVersion = '10.21.4'
    configFile = file("${rootDir}/configuration/checkstyle/google_checks.xml")
    ignoreFailures = false
    showViolations = true
}

checkstyleMain.reports {
    html.required = true
    xml.required = true
}

checkstyleTest.reports {
    html.required = true
    xml.required = true
}

